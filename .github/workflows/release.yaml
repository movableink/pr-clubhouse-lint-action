name: create-release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  get-release-version:
    runs-on: ubuntu-slim
    outputs:
      next_version: ${{ steps.get_version.outputs.next_version }}
    steps:
      - uses: actions/checkout@v6
      - name: get-version
        id: get_version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          echo "VERSION"
          echo "$VERSION"
          MAJOR=$(echo "$VERSION" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$VERSION" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$VERSION" | sed 's/^v//' | cut -d. -f3)
          NEXT_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "NEXT_VERSION"
          echo "$NEXT_VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

  create-tag:
    needs: get-release-version
    runs-on: ubuntu-slim
    name: create-tag
    steps:
      - uses: actions/checkout@v6
      - name: tag-version
        id: tag_version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ needs.get-release-version.outputs.next_version }}
          tag_prefix: ""

  create-github-release:
    needs:
      - create-tag
      - get-release-version
    runs-on: ubuntu-slim
    name: create-github-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.get-release-version.outputs.next_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
