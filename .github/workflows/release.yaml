name: Release
on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
      - run: npm install
      - run: npm test

  release:
    needs: test
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
      - run: npm install
      - run: npm run build
      - name: Update v1 tag
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -f dist/
          git commit -m "build: release $(git rev-parse HEAD)"
          git tag -f v1
          git push -f origin refs/tags/v1
