name: Verify

on:
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm test
